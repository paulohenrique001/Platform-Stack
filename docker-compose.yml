name: dockge-platform

services:
  dockge:
    image: louislam/dockge:1
    restart: unless-stopped
    environment:
      DOCKGE_ENABLE_CONSOLE: ${DOCKGE_ENABLE_CONSOLE}
      DOCKGE_STACKS_DIR: /opt/stacks
      TZ: America/Sao_Paulo
    ports:
      - "${DOCKGE_PORT}:5001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dockge_data:/app/data
      - ${DOCKGE_STACKS_PATH}:/opt/stacks
    networks:
      - platform

  dozzle:
    image: amir20/dozzle:latest
    restart: unless-stopped
    environment:
      DOZZLE_LEVEL: info
      TZ: America/Sao_Paulo
    ports:
      - "${DOZZLE_PORT}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - platform

  uptime-kuma:
    image: louislam/uptime-kuma:2
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
    ports:
      - "${UPTIME_KUMA_PORT}:3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - platform

volumes:
  dockge_data:
    name: dockge_dockge_data
  uptime_kuma_data:
    name: dockge_uptime_kuma_data

networks:
  platform:
    name: dockge_platform_network
