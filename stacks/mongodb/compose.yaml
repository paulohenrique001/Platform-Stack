name: ${STACK_NAME:-mongodb}

services:
  mongodb:
    image: mongo:7
    container_name: ${MONGODB_CONTAINER_NAME:-dockge-mongodb}
    restart: ${RESTART_POLICY:-unless-stopped}
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-change_me_mongodb_password}
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-app}
      TZ: ${TZ:-America/Sao_Paulo}
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mongodb

volumes:
  mongodb_data:
    name: ${MONGODB_DATA_VOLUME_NAME:-dockge_mongodb_data}

networks:
  mongodb:
    name: ${MONGODB_NETWORK_NAME:-dockge_mongodb_network}
