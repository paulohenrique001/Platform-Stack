name: ${STACK_NAME:-mariadb}

services:
  mariadb:
    image: mariadb:11
    container_name: ${MARIADB_CONTAINER_NAME:-dockge-mariadb}
    restart: ${RESTART_POLICY:-unless-stopped}
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-change_me_root_password}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-app}
      MARIADB_USER: ${MARIADB_USER:-app}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-change_me_app_password}
      TZ: ${TZ:-America/Sao_Paulo}
    ports:
      - "${MARIADB_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb-admin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - database

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ${PHPMYADMIN_CONTAINER_NAME:-dockge-phpmyadmin}
    restart: ${RESTART_POLICY:-unless-stopped}
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      TZ: ${TZ:-America/Sao_Paulo}
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - database

volumes:
  mariadb_data:
    name: ${MARIADB_DATA_VOLUME_NAME:-dockge_mariadb_data}

networks:
  database:
    name: ${DATABASE_NETWORK_NAME:-dockge_database_network}
