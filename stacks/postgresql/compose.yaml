name: ${STACK_NAME:-postgresql}

services:
  postgresql:
    image: postgres:16-alpine
    container_name: ${POSTGRESQL_CONTAINER_NAME:-dockge-postgresql}
    restart: ${RESTART_POLICY:-unless-stopped}
    environment:
      POSTGRES_USER: ${POSTGRESQL_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASSWORD:-change_me_postgresql_password}
      POSTGRES_DB: ${POSTGRESQL_DATABASE:-app}
      TZ: ${TZ:-America/Sao_Paulo}
    ports:
      - "${POSTGRESQL_PORT:-5432}:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - postgresql

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ${PGADMIN_CONTAINER_NAME:-dockge-pgadmin}
    restart: ${RESTART_POLICY:-unless-stopped}
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change_me_pgadmin_password}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      TZ: ${TZ:-America/Sao_Paulo}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - postgresql

volumes:
  postgresql_data:
    name: ${POSTGRESQL_DATA_VOLUME_NAME:-dockge_postgresql_data}
  pgadmin_data:
    name: ${PGADMIN_DATA_VOLUME_NAME:-dockge_pgadmin_data}

networks:
  postgresql:
    name: ${POSTGRESQL_NETWORK_NAME:-dockge_postgresql_network}
