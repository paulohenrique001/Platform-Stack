name: ${STACK_NAME:-redis}

services:
  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER_NAME:-dockge-redis}
    restart: ${RESTART_POLICY:-unless-stopped}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-change_me_redis_password}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_me_redis_password}
      TZ: ${TZ:-America/Sao_Paulo}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - redis

  redis-insight:
    image: redis/redisinsight:latest
    container_name: ${REDIS_INSIGHT_CONTAINER_NAME:-dockge-redis-insight}
    restart: ${RESTART_POLICY:-unless-stopped}
    environment:
      RI_APP_PORT: 5540
      TZ: ${TZ:-America/Sao_Paulo}
    ports:
      - "${REDIS_INSIGHT_PORT:-5540}:5540"
    volumes:
      - redis_insight_data:/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - redis

volumes:
  redis_data:
    name: ${REDIS_DATA_VOLUME_NAME:-dockge_redis_data}
  redis_insight_data:
    name: ${REDIS_INSIGHT_DATA_VOLUME_NAME:-dockge_redis_insight_data}

networks:
  redis:
    name: ${REDIS_NETWORK_NAME:-dockge_redis_network}
