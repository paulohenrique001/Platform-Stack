name: redis

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TZ: America/Sao_Paulo
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - redis

  redis-insight:
    image: redis/redisinsight:latest
    restart: unless-stopped
    environment:
      RI_APP_PORT: 5540
      TZ: America/Sao_Paulo
    ports:
      - "${REDIS_INSIGHT_PORT}:5540"
    volumes:
      - redis_insight_data:/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - redis

volumes:
  redis_data:
    name: dockge_redis_data
  redis_insight_data:
    name: dockge_redis_insight_data

networks:
  redis:
    name: dockge_redis_network
