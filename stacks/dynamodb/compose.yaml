name: ${STACK_NAME:-dynamodb}

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: ${DYNAMODB_CONTAINER_NAME:-dockge-dynamodb-local}
    restart: ${RESTART_POLICY:-unless-stopped}
    user: root
    command: -jar DynamoDBLocal.jar -sharedDb -dbPath ./data
    working_dir: /home/dynamodblocal
    ports:
      - "${DYNAMODB_PORT:-8000}:8000"
    volumes:
      - dynamodb_data:/home/dynamodblocal/data
    networks:
      - dynamodb

  aws-cli:
    image: amazon/aws-cli:latest
    container_name: ${AWS_CLI_CONTAINER_NAME:-dockge-aws-cli}
    restart: ${RESTART_POLICY:-unless-stopped}
    entrypoint: ["sh", "-c", "sleep infinity"]
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-DUMMYIDEXAMPLE}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-DUMMYEXAMPLEKEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-west-2}
      DYNAMODB_ENDPOINT_URL: http://dynamodb-local:8000
      TZ: ${TZ:-America/Sao_Paulo}
    depends_on:
      - dynamodb-local
    networks:
      - dynamodb

volumes:
  dynamodb_data:
    name: ${DYNAMODB_DATA_VOLUME_NAME:-dockge_dynamodb_data}

networks:
  dynamodb:
    name: ${DYNAMODB_NETWORK_NAME:-dockge_dynamodb_network}
