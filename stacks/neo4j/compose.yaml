name: ${STACK_NAME:-neo4j}

services:
  neo4j:
    image: neo4j:5-community
    container_name: ${NEO4J_CONTAINER_NAME:-dockge-neo4j}
    restart: ${RESTART_POLICY:-unless-stopped}
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-change_me_neo4j_password}
      TZ: ${TZ:-America/Sao_Paulo}
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - neo4j

volumes:
  neo4j_data:
    name: ${NEO4J_DATA_VOLUME_NAME:-dockge_neo4j_data}
  neo4j_logs:
    name: ${NEO4J_LOGS_VOLUME_NAME:-dockge_neo4j_logs}

networks:
  neo4j:
    name: ${NEO4J_NETWORK_NAME:-dockge_neo4j_network}
